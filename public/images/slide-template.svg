<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Title -->
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f0f0f0" letter-spacing="-0.5">slide template</text>
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#888">Copy, edit, present. 10 slides ready to go.</text>

  <!-- Slide grid: 5x2 mini slide thumbnails -->
  <!-- Row 1 -->
  <rect x="100" y="180" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="100" y="180" width="180" height="2" rx="1" fill="#e8e8e8"/>
  <text x="190" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ccc"># Welcome</text>
  <rect x="140" y="244" width="100" height="4" rx="2" fill="#333"/>
  <rect x="150" y="256" width="80" height="4" rx="2" fill="#2a2a2a"/>

  <rect x="310" y="180" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="310" y="180" width="180" height="2" rx="1" fill="#888"/>
  <text x="400" y="224" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## How it works</text>
  <rect x="340" y="238" width="30" height="4" rx="2" fill="#333"/>
  <rect x="340" y="248" width="100" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="340" y="258" width="80" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="340" y="268" width="90" height="4" rx="2" fill="#2a2a2a"/>

  <rect x="520" y="180" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="520" y="180" width="180" height="2" rx="1" fill="#888"/>
  <text x="610" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Code blocks</text>
  <rect x="548" y="232" width="144" height="48" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <rect x="556" y="244" width="60" height="3" rx="1.5" fill="#6a9955"/>
  <rect x="556" y="253" width="80" height="3" rx="1.5" fill="#569cd6"/>
  <rect x="556" y="262" width="50" height="3" rx="1.5" fill="#dcdcaa"/>

  <rect x="730" y="180" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="730" y="180" width="180" height="2" rx="1" fill="#888"/>
  <text x="820" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Tables</text>
  <!-- Mini table -->
  <line x1="762" y1="234" x2="878" y2="234" stroke="#333" stroke-width="1"/>
  <line x1="762" y1="248" x2="878" y2="248" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="762" y1="262" x2="878" y2="262" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="766" y="238" width="40" height="4" rx="2" fill="#444"/>
  <rect x="830" y="238" width="40" height="4" rx="2" fill="#444"/>
  <rect x="766" y="252" width="30" height="4" rx="2" fill="#333"/>
  <rect x="830" y="252" width="30" height="4" rx="2" fill="#333"/>

  <rect x="940" y="180" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="940" y="180" width="180" height="2" rx="1" fill="#888"/>
  <text x="1030" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Blockquotes</text>
  <rect x="968" y="234" width="3" height="36" rx="1.5" fill="#666"/>
  <rect x="980" y="238" width="100" height="4" rx="2" fill="#444" opacity="0.7"/>
  <rect x="980" y="250" width="80" height="4" rx="2" fill="#333" opacity="0.7"/>
  <rect x="980" y="262" width="60" height="3" rx="1.5" fill="#555" opacity="0.5"/>

  <!-- Row 2 -->
  <rect x="100" y="320" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="100" y="320" width="180" height="2" rx="1" fill="#888"/>
  <text x="190" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Bullet points</text>
  <circle cx="138" cy="376" r="2" fill="#555"/>
  <rect x="146" y="374" width="80" height="4" rx="2" fill="#333"/>
  <circle cx="138" cy="390" r="2" fill="#555"/>
  <rect x="146" y="388" width="100" height="4" rx="2" fill="#333"/>
  <circle cx="138" cy="404" r="2" fill="#555"/>
  <rect x="146" y="402" width="70" height="4" rx="2" fill="#333"/>

  <rect x="310" y="320" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="310" y="320" width="180" height="2" rx="1" fill="#888"/>
  <text x="400" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Images</text>
  <!-- Image placeholder -->
  <rect x="350" y="370" width="100" height="50" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="375" cy="388" r="6" fill="none" stroke="#444" stroke-width="1"/>
  <polyline points="356,412 380,392 410,412" fill="none" stroke="#444" stroke-width="1"/>

  <rect x="520" y="320" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="520" y="320" width="180" height="2" rx="1" fill="#888"/>
  <text x="610" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Tips</text>
  <rect x="548" y="372" width="144" height="4" rx="2" fill="#333"/>
  <rect x="548" y="384" width="120" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="548" y="396" width="130" height="4" rx="2" fill="#2a2a2a"/>

  <rect x="730" y="320" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="730" y="320" width="180" height="2" rx="1" fill="#888"/>
  <text x="820" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#999">## Shortcuts</text>
  <!-- Mini keyboard keys -->
  <rect x="770" y="374" width="28" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="784" y="387" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#888">&#x2190;</text>
  <rect x="806" y="374" width="28" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="820" y="387" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#888">&#x2192;</text>
  <rect x="842" y="374" width="28" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="856" y="387" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#888">esc</text>

  <rect x="940" y="320" width="180" height="115" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="940" y="320" width="180" height="2" rx="1" fill="#e8e8e8"/>
  <text x="1030" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ccc"># Thank you</text>
  <rect x="980" y="396" width="100" height="4" rx="2" fill="#333"/>

  <!-- Slide count badge -->
  <rect x="510" y="468" width="180" height="30" rx="8" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="600" y="488" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#888">10 slides</text>

  <!-- Frontmatter hint -->
  <rect x="420" y="520" width="360" height="30" rx="8" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="600" y="540" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#666">slides: true  |  npm run sync</text>

  <!-- Bottom bar -->
  <text x="600" y="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#555">markdown.fast</text>
</svg>
