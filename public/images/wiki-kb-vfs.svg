<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Connection lines between boxes -->
  <line x1="310" y1="340" x2="490" y2="340" stroke="#333" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="710" y1="340" x2="890" y2="340" stroke="#333" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Wiki box -->
  <rect x="80" y="240" width="230" height="200" rx="12" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="80" y="240" width="230" height="3" rx="1.5" fill="#e8e8e8"/>

  <!-- Wiki icon: book/pages -->
  <g transform="translate(170, 290)">
    <rect x="-16" y="-12" width="14" height="24" rx="2" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <rect x="2" y="-12" width="14" height="24" rx="2" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <line x1="-10" y1="-4" x2="-5" y2="-4" stroke="#888" stroke-width="1"/>
    <line x1="-10" y1="0" x2="-5" y2="0" stroke="#888" stroke-width="1"/>
    <line x1="-10" y1="4" x2="-7" y2="4" stroke="#888" stroke-width="1"/>
    <line x1="5" y1="-4" x2="12" y2="-4" stroke="#888" stroke-width="1"/>
    <line x1="5" y1="0" x2="10" y2="0" stroke="#888" stroke-width="1"/>
  </g>

  <text x="195" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#e8e8e8">LLM Wiki</text>
  <text x="195" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Compiled pages</text>
  <text x="195" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Backlinks + index</text>
  <text x="195" y="399" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Daily cron</text>

  <!-- Knowledge Bases box -->
  <rect x="490" y="240" width="230" height="200" rx="12" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="490" y="240" width="230" height="3" rx="1.5" fill="#e8e8e8"/>

  <!-- KB icon: layered folders -->
  <g transform="translate(605, 290)">
    <rect x="-18" y="-8" width="36" height="22" rx="3" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <rect x="-14" y="-12" width="28" height="4" rx="2" fill="none" stroke="#999" stroke-width="1"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#888" stroke-width="1"/>
    <line x1="-10" y1="5" x2="6" y2="5" stroke="#888" stroke-width="1"/>
  </g>

  <text x="605" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#e8e8e8">Knowledge Bases</text>
  <text x="605" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Obsidian vaults</text>
  <text x="605" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Per-KB API access</text>
  <text x="605" y="399" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">Knowledge graph</text>

  <!-- VFS box -->
  <rect x="890" y="240" width="230" height="200" rx="12" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="890" y="240" width="230" height="3" rx="1.5" fill="#e8e8e8"/>

  <!-- VFS icon: terminal -->
  <g transform="translate(1005, 290)">
    <rect x="-18" y="-12" width="36" height="24" rx="3" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <polyline points="-10,-4 -4,0 -10,4" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="4" x2="10" y2="4" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <text x="1005" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#e8e8e8">Virtual Filesystem</text>
  <text x="1005" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">ls, cat, grep, find</text>
  <text x="1005" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">No auth required</text>
  <text x="1005" y="399" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#777">HTTP endpoints</text>

  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f0f0f0" letter-spacing="-0.5">Wiki, knowledge bases, and VFS</text>
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#888">Your content builds itself into a searchable knowledge layer</text>

  <!-- Bottom bar -->
  <text x="600" y="560" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#555">markdown.fast</text>

  <!-- Small connection nodes -->
  <circle cx="310" cy="340" r="3" fill="#555"/>
  <circle cx="490" cy="340" r="3" fill="#555"/>
  <circle cx="710" cy="340" r="3" fill="#555"/>
  <circle cx="890" cy="340" r="3" fill="#555"/>
</svg>
